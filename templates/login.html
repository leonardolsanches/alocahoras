<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Aprovação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="card login-card">
            <div class="login-header">
                <img src="{{ url_for('static', filename='images/logoclaro.png') }}" alt="Claro" class="claro-logo">
                <h3>Sistema de Aprovação</h3>
                <p class="mb-0">Gestão de Alocações</p>
            </div>
            <div class="card-body p-4">
                        <form method="POST">
                            <div class="mb-3">
                                <label for="selected_user" class="form-label">Selecione seu nome:</label>
                                <select name="selected_user" id="selected_user" class="form-select" required>
                                    <option value="">Escolha seu nome...</option>
                                    {% for manager in managers %}
                                    <option value="{{ manager }}">{{ manager }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Senha:</label>
                                <div class="input-group">
                                    <input type="password" name="password" id="password" class="form-control" 
                                           value="claro123" required>
                                    <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                                <small class="text-muted">Senha padrão: claro123</small>
                            </div>
                            <button type="submit" class="btn btn-claro w-100">Entrar</button>
                        </form>
                        
                        {% if error %}
                        <div class="alert alert-danger mt-3">{{ error }}</div>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const toggleButton = document.getElementById('togglePassword');
        if (toggleButton) {
            toggleButton.addEventListener('click', function() {
                const passwordField = document.getElementById('password');
                const icon = this.querySelector('i');
                
                if (passwordField.type === 'password') {
                    passwordField.type = 'text';
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash');
                } else {
                    passwordField.type = 'password';
                    icon.classList.remove('fa-eye-slash');
                    icon.classList.add('fa-eye');
                }
            });
        }
    });
    </script>
</body>
</html>
